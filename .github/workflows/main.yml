name : Postman collection workflow
on:
  push:
    branches: [main]
  workflow_dispatch: 
  schedule:
    - cron: 30 02 * * * #8am ist
    - cron: 00 14 * * *
    - cron: 00 06 * * 1-5

jobs:
  run-jobs:
   runs-on: ubuntu-latest

   steps:
     - name: checkout the code
       uses: actions/checkout@v6.0.2
     - name: install nodejs
       uses: actions/setup-node@v6.2.0
       with:
         node-version: '22'
     - name: Install newman and html extra reporter
       run: |
            npm install -g newman
            npm install -g newman-reporter-htmlextra
     - name: Run the postman collection
       run:  |
            mkdir -p newman
            newman run "In warrantyflow CSV_Data.postman_collection.json" \
              -e QA.postman_environment.json \
              -d Testdata.csv \
              -r cli,htmlextra \
              --reporter-htmlextra-export newman/index.html
     - name: Newman report
       if: always()
       uses: actions/upload-artifact@v7.0.0
       with:
         name: Newman report
         path: newman/report.html

     - name: Creating github page branch
       if: always()
       uses: peaceiris/actions-gh-pages@v4.0.0
       with:
         github_token: ${{ secrets.GITHUB_TOKEN }}
         publish_dir: newman/

      - name: Send email
        if: always()
        uses: dawidd6/action-send-mail@v11
        with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{secrets.EMAIL_USERNAME }}
        password: ${{secrets.EMAIL_PASSWORD }}
        subject: Inwarrenty flow execution notification
        to: varsha8108@gmail.com
        from: ${{secrets.EMAIL_USERNAME }}
        body: |
              Hi,
              Please find the status of the postman test execution of the inwarrenty flow execution with URL: https://varsha8108.github.io/Inwarrantyflow/
              
        








     
